<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Telegram Dice Sender</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔒Login🔒</h1>
            <p>Sign in to continue</p>
        </header>

        <main>
            <section class="card" style="max-width:480px;margin:0 auto;">
                
                  
                

                <form method="POST" action="/login">
                    <div class="form-group">
                        <label for="username_login">Username</label>
                        <input type="text" id="username_login" name="username_login" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label for="password_login">Password</label>
                        <input type="password" id="password_login" name="password_login" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
